name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ship_plan_auditor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ship_plan_auditor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply schema migrations + seed data
        run: |
          psql "$DATABASE_URL" -f src/backend/db/migrations/001_category_lookup.sql
          psql "$DATABASE_URL" -f src/backend/db/migrations/002_eval_runs.sql
          psql "$DATABASE_URL" -f src/backend/db/seed_data.sql

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q
